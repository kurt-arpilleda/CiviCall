name: civicall
description: "CiviCall App for students of BATSTATE U"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  http: ^1.3.0
  shared_preferences: ^2.5.2
  fluttertoast: ^8.2.12
  open_file: ^3.5.10
  package_info_plus: ^8.3.0
  permission_handler: ^11.4.0
  path_provider: ^2.1.5
  wakelock_plus: ^1.3.2
  unique_identifier: ^0.4.0
  google_sign_in: ^6.1.5
  flutter_secure_storage: ^9.2.4
  uuid: ^4.5.1
  image_picker: ^1.1.2
  connectivity_plus: ^6.1.5
  intl: ^0.20.2
  url_launcher: ^6.3.2
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0
  googleapis_auth: ^2.0.0
  flutter_image_compress: ^2.4.0
  file_picker: ^11.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Lato-Black
      fonts:
        - asset: assets/fonts/Lato-Black.ttf
    - family: Lato-Italic
      fonts:
        - asset: assets/fonts/Lato-Italic.ttf
          weight: 600

